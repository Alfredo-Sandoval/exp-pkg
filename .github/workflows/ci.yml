name: CI

# Run on every push to main and on every pull request.
on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref (branch or PR) when a new run starts.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the workflow only needs to read the repository contents.
permissions:
  contents: read

jobs:
  qa:
    name: QA (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Surface failures on every platform instead of stopping at the first.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # uv gives fast, reproducible dependency resolution and a cached install.
      # This repo installs from pyproject.toml (no uv.lock), so key the cache on
      # pyproject.toml; the default **/uv.lock glob would error with no lockfile.
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      # Create and activate a project virtualenv. Activating it sets VIRTUAL_ENV,
      # which is what environment/run-in-env.sh keys off of, so `make coverage`
      # runs against this env without needing mamba/conda. Every later step in
      # this job inherits the exported PATH/VIRTUAL_ENV via $GITHUB_ENV.
      - name: Create virtual environment
        run: |
          uv venv --python "${{ matrix.python-version }}" .venv
          echo "VIRTUAL_ENV=${GITHUB_WORKSPACE}/.venv" >> "$GITHUB_ENV"
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"

      # Install the package plus the [dev] extra (Pyright, pytest, Ruff, twine).
      - name: Install package with dev extras
        run: uv pip install -e ".[dev]"

      # Lint, type-check, and test run as separate steps so a failure points at
      # the exact gate. We use the canonical `make` targets so CI matches the
      # local gate exactly: environment/run-in-env.sh execs straight through
      # when VIRTUAL_ENV is set (the venv step above), so no conda is needed,
      # and `make typecheck` passes the active interpreter to Pyright so it
      # resolves the venv's installed dependencies (click, numpy, ...).
      - name: Lint (ruff)
        run: make lint

      - name: Type check (Pyright)
        run: make typecheck

      # `make coverage` runs pytest with coverage and writes coverage.xml.
      - name: Test with coverage
        run: make coverage

      - name: Check performance budgets
        run: make performance-check

      # coverage.xml may not exist if the coverage target changes; do not fail.
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
