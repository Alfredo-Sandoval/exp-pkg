site_name: Posetta
site_description: API documentation for the Posetta pose IO toolkit.
repo_name: Alfredo-Sandoval/Posetta
repo_url: https://github.com/Alfredo-Sandoval/Posetta

theme:
  name: material
  icon:
    logo: material/graph-outline
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            docstring_options:
              warnings: false
            heading_level: 2
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
      - Media IO Stack: architecture/media-io.md
      - Experimental Durable Store: architecture/experimental-store.md
  - API Guide:
      - Model: api/model.md
      - Formats: api/formats.md
      - Adapters: api/adapters.md
  - Reference:
      - posetta.model: reference/model.md
      - posetta.formats: reference/formats.md
      - posetta.adapters: reference/adapters.md
