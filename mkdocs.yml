site_name: exp-pkg
site_description: Typed data I/O and portable project packaging for multimodal neuroscience experiments.
repo_name: Alfredo-Sandoval/exp-pkg
repo_url: https://github.com/Alfredo-Sandoval/exp-pkg

theme:
  name: material
  icon:
    logo: material/cube-outline
    repo: fontawesome/brands/github
  font: false  # Use the @import in docs/stylesheets/extra.css for Inter + JetBrains Mono.
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - navigation.path
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            docstring_options:
              warnings: false
            heading_level: 2
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Performance Guidance: performance.md
  - Roadmap: roadmap.md
  - Behavior Video Roadmap: luxem_2023_gap_analysis.md
  - 3D Pose Design: pose_3d_design.md
  - Identity Provenance: identity_provenance.md
  - Artifact Contract v1: artifact_contract_v1.md
  - Artifact Namespaces: artifact-namespaces.md
  - CLI Command Spec v1: cli_command_spec_v1.md
  - Architecture:
      - Multimodal Session Model: architecture/multimodal-session.md
      - Media IO Stack: architecture/media-io.md
      - Storage Direction: architecture/storage-direction.md
      - Project Durability: architecture/experimental-store.md
  - Development:
      - Local Quality Gates: development/local-ci.md
      - Release Checklist: development/release.md
  - API Guide:
      - Model: api/model.md
      - Adapters: api/adapters.md
      - Services: api/services.md
      - Project: api/project.md
  - Reference:
      - xpkg.model: reference/model.md
      - xpkg.adapters: reference/adapters.md
      - xpkg.services: reference/services.md
      - xpkg.project: reference/project.md
