site_name: exp-pkg
site_description: API documentation for exp-pkg and the xpkg Python package.
repo_name: Alfredo-Sandoval/exp-pkg
repo_url: https://github.com/Alfredo-Sandoval/exp-pkg

theme:
  name: material
  icon:
    logo: material/graph-outline
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            docstring_options:
              warnings: false
            heading_level: 2
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Artifact Contract v1: artifact_contract_v1.md
  - CLI Command Spec v1: cli_command_spec_v1.md
  - Architecture:
      - Media IO Stack: architecture/media-io.md
      - Storage Direction: architecture/storage-direction.md
      - Experimental Durable Store: architecture/experimental-store.md
      - POSIX Durable Store Spec: architecture/posix-durable-store-spec.md
  - Development:
      - Local CI: development/local-ci.md
  - API Guide:
      - Model: api/model.md
      - Codecs: api/codecs.md
      - Services: api/services.md
      - Formats: api/formats.md
  - Reference:
      - xpkg.model: reference/model.md
      - xpkg.codecs: reference/codecs.md
      - xpkg.services: reference/services.md
      - xpkg.formats: reference/formats.md
