[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "posetta"
version = "0.1.0"
description = "Native .siesta archive IO and adapter toolkit for pose data."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "cattrs>=23.1",
  "h5py>=3.9,<4",
  "imageio>=2.31",
  "imageio-ffmpeg>=0.5",
  "numpy>=1.26,<3",
  "opencv-python-headless>=4.8",
  "pandas>=2.0",
  "pyyaml>=6.0",
  "tables>=3.9",
]

[project.optional-dependencies]
docs = [
  "mkdocs>=1.6",
  "mkdocs-material>=9.5",
  "mkdocstrings[python]>=0.24",
]

[project.scripts]
posetta = "posetta.cli:main"

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "N"]
ignore = []

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-ra"
