repo:
  name: "exp-pkg"
  slug: "Alfredo-Sandoval/exp-pkg"
  visibility: "private"
  preset: "base"
  support_matrix:
    - macos
    - linux
  windows_enabled: false

tooling:
  setup: "make env"
  setup_fallback: "bash environment/setup.sh"
  lint: "ruff check ."
  typecheck: "ty check"
  test: "pytest"

license:
  id: "all-rights-reserved"
  spdx: "NONE"
  notice: "All rights reserved."
  holders:
    - "Alfredo and Joseph Sandoval"
  file: "LICENSE"

manifest:
  mode: "none"
  schema: "none"
  canonical_paths: []
  optional_paths: []
